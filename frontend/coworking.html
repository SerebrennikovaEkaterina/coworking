<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Коворкинг</title>
  </head>
  <body class="body">
    <header class="header">
      <div class="header__container container flex">
        <button class="back-button">Назад</button>
        <p class="slogan h2-text lato-regular">Найди свой уголок</p>
      </div>
    </header>
    <main class="main flex">
      <section class="hero coworking-page">
        <div class="container">
          <div class="coworking-page__hero-content flex">
            <h1 class="h1-title h1-title-coworking-page">Коворкинги Москвы</h1>
          </div>
        </div>
      </section>
      <section class="about-coworking">
        <div class="container">
          <div class="address"></div>
          <div class="price">от 500 р.</div>
        </div>
      </section>
      <section class="amenities">
        <div class="container">
          <h2 class="h2-title">Удобства</h2>
          <div class="amenities__container"></div>
        </div>
      </section>
      <section class="gallery">
        <div class="container"><h2 class="h2-title">Галерея</h2>
          <div class="gallery__images-container"></div></div>
      </section>
    </main>
    <script type="module" src="/src/coworking.js"></script>
  </body>
</html>
