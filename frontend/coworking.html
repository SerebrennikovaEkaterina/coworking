<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Коворкинг</title>
  </head>
  <body class="body">
    <header class="header">
      <div class="header__container container flex">
        <a class="back-link" href="index.html"><svg class="back-link__svg-icon" viewBox="0 0 16 16"
          fill="none"> 
  <path
    d="M10 4L6 8L10 12"
    stroke="currentColor"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
        </svg></a>
        <p class="slogan h2-text lato-regular">Найди свой уголок</p>
      </div>
    </header>
    <main class="main flex">
      <section class="hero coworking-page">
        <div class="container">
          <div class="coworking-page__hero-content flex">
            <h1 class="h1-title h1-title-coworking-page">Коворкинги Москвы</h1>
          </div>
        </div>
      </section>
      <section class="about-coworking">
        <div class="container flex">
          <div class="about-coworking__info">
            <div class="address"></div>
            <div class="price"></div>
            
          </div>
          <div class="about-coworking__actions"></div>
        </div>
      </section>
      <section class="coworking-description"></section>
      <section class="amenities">
        <div class="container">
          <h2 class="h2-title">Удобства и услуги</h2>
          <ul class="amenities__container list-reset"></ul>
        </div>
      </section>
      <section class="gallery">
        <div class="container">
          <h2 class="h2-title">Галерея</h2>
          <div class="gallery-window">
            <div class="gallery__images-container"></div>
            <div class="gallery__btns">
              <button class="gallery-btn prev">
                <svg class="gallery-btn__svg-icon"
  viewBox="0 0 16 16"
  fill="none"
>
  <path
    d="M10 4L6 8L10 12"
    stroke="currentColor"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg></button>
              <button class="gallery-btn next">
                <svg
  class="gallery-btn__svg-icon"
  viewBox="0 0 16 16"
  fill="none"
>
  <path
    d="M6 4L10 8L6 12"
    stroke="currentColor"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
              </button>
            </div>
          </div>
          <div class="gallery__images-container"></div>
        </div>
      </section>
    </main>
    <script type="module" src="/src/coworking.js"></script>
  </body>
</html>
