<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div id="app">
      <div id="header-container"></div>
      <main class="main flex">
        <section class="hero">
          <div class="container">
            <div class="hero__content flex">
              <div class="hero__overlay"></div>
              <h1 class="h1-title">Коворкинги Москвы</h1>
            </div>
          </div>
        </section>
        <section class="coworkings">
          <div class="container">
            <h2 class="h2-title">Каталог коворкингов</h2>
            <div class="view-switcher-wrapper flex">
              <div class="view-switcher">
                <div class="view-indicator"></div>
                <button class="view-btn active tab" data-view="list">
                  <svg class="svg" viewBox="0 0 24 24">
                    <rect
                      x="4"
                      y="6"
                      width="16"
                      height="2"
                      rx="1"
                      fill="currentColor"
                    />
                    <rect
                      x="4"
                      y="11"
                      width="16"
                      height="2"
                      rx="1"
                      fill="currentColor"
                    />
                    <rect
                      x="4"
                      y="16"
                      width="16"
                      height="2"
                      rx="1"
                      fill="currentColor"
                    />
                  </svg>
                  <span class="view-btn-text btn-text">списком</span>
                </button>
                <button class="view-btn tab" data-view="grid">
                  <svg
                    class="svg"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="currentColor"
                  >
                    <rect x="3" y="3" width="7" height="7" rx="1.5" />
                    <rect x="14" y="3" width="7" height="7" rx="1.5" />
                    <rect x="3" y="14" width="7" height="7" rx="1.5" />
                    <rect x="14" y="14" width="7" height="7" rx="1.5" />
                  </svg>
                  <span class="view-btn-text btn-text">плиткой</span>
                </button>
                <button class="view-btn tab" data-view="map">
                  <svg
                    class="svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="currentColor"
                    xmlns="http://www.w3.org/2000/svg"
                  >
                    <path
                      fill-rule="evenodd"
                      d="
                    M12 2
                    C16 2 19 5 19 9
                    C19 13 12 22 12 22
                    C12 22 5 13 5 9
                    C5 5 8 2 12 2
                    Z
                
                    M12 5.8
                    A3.2 3.2 0 1 0 12 12.2
                    A3.2 3.2 0 1 0 12 5.8
                  "
                    />
                  </svg>
                  <span class="view-btn-text btn-text">на&#160;карте</span>
                </button>
              </div>
            </div>

            <div class="views">
              <div class="map hidden"></div>
            </div>
            <ul class="cards list-reset view-list">
              <li class="list-item card">
                <div class="coworking-info-1 flex">
                  <h3 class="h3-title">Meeting-point</h3>
                  <p class="card__adress">
                    ул. Охотный ряд, д.2, подъезд 9, этаж 5
                  </p>
                  <p class="card__price">от 800 р/час</p>
                  <a href="coworking.html" class="card__link flex btn-text">
                    подробнее
                  </a>
                </div>
                <div class="coworking-info-2 flex">
                  <div class="indicator">
                    <div class="indicator__percent-text">65%</div>
                  </div>
                  <button class="button itinerary flex">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none">
                      <path
                        fill="currentColor"
                        d="M3.33 18a2.67 2.67 0 1 0 5.34 0 2.67 2.67 0 0 0-5.34 0M17 14l.17.47a.5.5 0 0 0-.04-.95zM6 11.11l-.24-.44a.5.5 0 0 0 .11.92zM19 4l-5.77-.14 2.77 5.07zM6 18l.17.47 11-4-.17-.47-11 4zm11-4 .13-.48-11-2.9-.13.48 11 2.9zM6 11.11l.24.44 9.05-4.95-.24-.44-9.05 4.95z"
                      />
                    </svg>
                    <span class="btn-text itinerary__btn">маршрут</span>
                  </button>
                </div>
                <button class="primary-button btn-text">посетить</button>
              </li>
            </ul>
          </div>
        </section>
      </main>
      <div id="nav-container"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
