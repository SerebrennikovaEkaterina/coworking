<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
    <style>
      html,
      body {
        height: 100%;
      }
      .body.is-loading {
        overflow: hidden;
      }
      #app {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        opacity: 0;
        transition: opacity 0.4s ease;
      }

      #app.loaded {
        opacity: 1;
      }

      #loader {
        position: fixed;
        inset: 0;
        background: var(--dark-gray);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }

      #loader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loader__content {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 64px;
        padding-bottom: 128px;
      }
      .loader__text-wrapper {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .loader__text {
        display: inline-block;
        color: white;
      }

      .loader__logo {
        position: relative;
        color: white;
      }

      .loader__hello {
        display: flex;
        gap: 4px;
      }

      .loader__logo::after {
        content: url(/icons/logo-angle.svg);
        position: absolute;
        width: 11px;
        height: 11px;
        top: -5px;
        right: -11px;
        animation: angleMove 1.2s ease-in-out infinite;
      }

      @keyframes angleMove {
        0% {
          transform: translate(0, 0);
        }

        30% {
          transform: translate(4px, -4px);
        }

        60% {
          transform: translate(6px, -6px);
        }

        100% {
          transform: translate(0, 0);
        }
      }
    </style>
  </head>
